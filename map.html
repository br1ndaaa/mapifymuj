<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MapifyMUJ · Map</title>

<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
</head>

<body>
<div id="app">

  <!-- BUILDINGS VIEW -->
  <div id="view-buildings">
    <div class="topbar">
      <div class="topbar-inner">
        <div>
          <p class="greeting">📍 Manipal University Jaipur</p>
          <h1 class="hero-title">Navigate Campus</h1>
        </div>
        <div class="avatar">C</div>
      </div>
    </div>

    <p class="sec-label">Select Building</p>
    <div class="bld-grid" id="bld-grid"></div>
  </div>

  <!-- FLOORS VIEW -->
  <div id="view-floors" style="display:none">
    <div class="back-row">
      <button class="back-btn" onclick="showBuildings()">‹</button>
      <h1 class="hero-title" id="floor-title">Building</h1>
    </div>

    <p class="sec-label">Select Floor</p>
    <div class="floor-list" id="floor-list"></div>
  </div>

  <!-- ROOMS VIEW -->
  <div id="view-rooms" style="display:none">
    <div class="back-row">
      <button class="back-btn" onclick="showFloors()">‹</button>
      <h1 class="hero-title" id="room-title">Rooms</h1>
    </div>

    <div class="room-grid" id="room-grid"></div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <a class="nb" href="index.html">🏠 Home</a>
  <a class="nb" href="timetable.html">📅 Schedule</a>
  <a class="nb on" href="map.html">🗺️ Map</a>
</nav>

<script src="script.js"></script>

<script>
let selectedBuilding = null;
let selectedFloor = null;

/* ---------- BUILDINGS ---------- */
function renderBuildings() {
  const grid = document.getElementById("bld-grid");

  grid.innerHTML = Object.entries(BUILDING_META).map(([id, b]) => `
    <div class="bld-card" onclick="selectBuilding('${id}')">
      <div class="bld-icon" style="background:${b.light}">${b.emoji}</div>
      <div>
        <div class="bld-name">${b.short}</div>
        <div class="bld-sub">${Object.keys(ROOMS[id]).length} floors</div>
      </div>
    </div>
  `).join("");
}

function selectBuilding(id) {
  selectedBuilding = id;

  document.getElementById("view-buildings").style.display = "none";
  document.getElementById("view-floors").style.display = "block";

  document.getElementById("floor-title").textContent = BUILDING_META[id].label;

  const floors = Object.keys(ROOMS[id]);

  document.getElementById("floor-list").innerHTML = floors.map(f => `
    <div class="floor-card" onclick="selectFloor('${f}')">
      <div class="floor-name">${f}</div>
      <div class="floor-meta">${ROOMS[id][f].length} rooms</div>
    </div>
  `).join("");
}

/* ---------- FLOORS ---------- */
function selectFloor(floor) {
  selectedFloor = floor;

  document.getElementById("view-floors").style.display = "none";
  document.getElementById("view-rooms").style.display = "block";

  document.getElementById("room-title").textContent = floor;

  const rooms = ROOMS[selectedBuilding][floor];

  document.getElementById("room-grid").innerHTML = rooms.map(r => `
    <div class="room-card">
      <div class="room-ico">🚪</div>
      <div class="rn">${r.num}</div>
      <div class="rt">${r.type}</div>
    </div>
  `).join("");
}

/* ---------- BACK ---------- */
function showBuildings() {
  document.getElementById("view-floors").style.display = "none";
  document.getElementById("view-buildings").style.display = "block";
}

function showFloors() {
  document.getElementById("view-rooms").style.display = "none";
  document.getElementById("view-floors").style.display = "block";
}

/* ---------- INIT ---------- */
renderBuildings();
</script>

</body>
</html>
