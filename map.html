<!DOCTYPE html>
<html>
<head>
    <title>MUJ Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        #map {
            height: 80vh;
            margin-top: 10px;
        }

        button {
            margin: 5px;
            padding: 8px 12px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>Mapify MUJ</h1>

<!-- ✅ NAVIGATION UI -->
<h2>Select Building</h2>

<button onclick="openBuilding('AB1')">AB1</button>
<button onclick="openBuilding('AB2')">AB2</button>
<button onclick="openBuilding('AB3')">AB3</button>
<button onclick="openBuilding('LHC')">LHC</button>
<button onclick="openBuilding('DOME')">DOME</button>

<!-- ⭐ FULL MAP BUTTON -->
<button onclick="showFullMap()">Full Map</button>

<hr>

<!-- Floors will appear here -->
<div id="floorSelection"></div>

<!-- ✅ FULL MAP SECTION (HIDDEN INITIALLY) -->
<div id="fullMapSection" style="display:none;">

    <h2>Campus Map</h2>

    <input type="text" id="searchBox" placeholder="Search building (e.g. AB1)">
    <button onclick="searchLocation()">Search</button>

    <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
/* ---------------- BUILDING → FLOOR ---------------- */

function openBuilding(building) {
    let floorsHTML = `
        <h3>${building} Floors</h3>
        <button onclick="openFloor('${building}', '1')">1st Floor</button>
        <button onclick="openFloor('${building}', '2')">2nd Floor</button>
        <button onclick="openFloor('${building}', '3')">3rd Floor</button>
    `;

    document.getElementById("floorSelection").innerHTML = floorsHTML;
}

function openFloor(building, floor) {
    alert(building + " Floor " + floor + " (next step: show indoor map)");
}

/* ---------------- FULL MAP ---------------- */

let map;  // declare globally
let currentShape = null;

function showFullMap() {

    document.getElementById("fullMapSection").style.display = "block";

    // initialize map ONLY ONCE
    if (!map) {

        var bounds = [
            [26.8415, 75.5635],
            [26.8455, 75.5685]
        ];

        map = L.map('map', {
            maxBounds: bounds,
            maxBoundsViscosity: 1.0,
            minZoom: 15,
            maxZoom: 19
        }).setView([26.8435, 75.5654], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // marker
        L.marker([26.8435, 75.5654]).addTo(map)
            .bindPopup("MUJ Campus")
            .openPopup();

        // click to get coordinates
        map.on('click', function(e) {
            console.log(e.latlng);
        });
    }
}

/* ---------------- SEARCH ---------------- */

var locations = {
    "AB1": [
        [26.843323298975545, 75.56470513343812],
        [26.84292144436609, 75.56368589401245],
        [26.841773280479554, 75.56419014930727],
        [26.842117730868093, 75.5651879310608]
    ]
};

function searchLocation() {

    var input = document.getElementById("searchBox").value.toUpperCase();

    if (locations[input]) {

        // remove old shape
        if (currentShape) {
            map.removeLayer(currentShape);
        }

        // draw polygon
        currentShape = L.polygon(locations[input], {
            color: 'purple',
            fillColor: 'purple',
            fillOpacity: 0.3
        }).addTo(map);

        currentShape.bindPopup(input).openPopup();

        // zoom
        map.flyToBounds(currentShape.getBounds(), {
            padding: [40, 40],
            maxZoom: 19,
            duration: 1.5
        });

    } else {
        alert("Location not found");
    }
}
</script>

</body>
</html>
